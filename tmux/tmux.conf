# Minimal tmux config — only for remote sessions
# Local multiplexing handled by WezTerm

# Prefix: Ctrl+b (keep default so it doesn't clash with WezTerm's Ctrl+Space)
# If you only use tmux remotely, this avoids conflicts

# Better splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Mouse support
set -g mouse on

# 256 colors + true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Scrollback
set -g history-limit 50000

# No delay on escape
set -sg escape-time 0

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Status bar - Tokyo Night minimal
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left " #S "
set -g status-left-style "bg=#7aa2f7,fg=#1a1b26,bold"
set -g status-right " %H:%M "
set -g status-right-style "bg=#1a1b26,fg=#9ece6a"
set -g window-status-current-style "bg=#414868,fg=#c0caf5,bold"
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
