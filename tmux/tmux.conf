# tmux — prefix Ctrl+Space to match WezTerm's leader. (WezTerm is configured
# to pass it through / tmux is used on remotes, so the prefix is consistent
# everywhere.)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane nav — vim style
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane nav — arrow keys
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Close pane
bind x kill-pane

# Pane cycling
bind -n C-Tab select-pane -t :.+
bind -n C-S-Tab select-pane -t :.-

# Zoom
bind z resize-pane -Z

# Windows (tabs)
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5

# Scrollback
bind -n PageUp copy-mode -u
bind -n PageDown send-keys PageDown

# Copy mode
bind [ copy-mode

# Search
bind f copy-mode \; send-keys /

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# DS workspace: top left/right + full bottom
# (-l N% replaces the old -p N, removed in tmux 3.4)
bind d split-window -v -l 35% -c "#{pane_current_path}" \; split-window -h -l 50% -c "#{pane_current_path}" \; select-pane -t 1

# Mouse
set -g mouse on

# Indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Scrollback
set -g history-limit 100000

# No escape delay
set -sg escape-time 10

# Dim inactive panes — matches WezTerm inactive_pane_hsb
set -g window-style 'fg=colour245,bg=#16161e'
set -g window-active-style 'fg=#a9b1d6,bg=#1a1b26'

# Status bar — Tokyo Night
set -g status-style 'bg=#1a1b26 fg=#a9b1d6'
set -g status-left '#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[default] '
set -g status-right '#[fg=#9ece6a]%H:%M  %a %b %d  #[fg=#7aa2f7]#H '
set -g status-left-length 30
set -g status-right-length 50
setw -g window-status-current-format '#[fg=#1a1b26,bg=#7aa2f7] #I: #W '
setw -g window-status-format '#[fg=#565f89,bg=#1a1b26] #I: #W '

# Pane borders
set -g pane-border-style 'fg=#565f89'
set -g pane-active-border-style 'fg=#7aa2f7'
