# Minimal tmux config — mirrors the WezTerm keymap so the muscle memory is the
# same whether you multiplex locally (WezTerm) or on a remote box (tmux).
#
# Prefix stays Ctrl+b: tmux usually runs *inside* WezTerm, whose leader is
# Ctrl+Space — they can't both own that key, so tmux keeps Ctrl+b. To make
# tmux use Ctrl+Space instead (e.g. when WezTerm isn't multiplexing), comment
# the `set -g prefix C-b` line and uncomment the C-Space block below.

# ── Prefix ──────────────────────────────────────────────────────────────────
set -g prefix C-b
# set -g prefix C-Space
# bind C-Space send-prefix
# unbind C-b

# ── Splits (WezTerm: leader |  /  -) ─────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Pane navigation — vim + arrows (WezTerm: leader h/j/k/l) ─────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# ── Pane resize (WezTerm: leader Shift+H/J/K/L) ──────────────────────────────
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# ── Pane management (WezTerm: leader x / z) ──────────────────────────────────
bind x kill-pane
bind z resize-pane -Z

# ── DS workspace (WezTerm: leader d) — top split L/R + full-width bottom ──────
bind d split-window -v -c "#{pane_current_path}" \; select-pane -U \; \
       split-window -h -c "#{pane_current_path}" \; select-pane -D

# ── Tabs = windows (WezTerm: leader c / n / p / 1-5) ─────────────────────────
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5

# ── Copy mode & search (WezTerm: leader [ / f) ───────────────────────────────
bind [ copy-mode
bind f copy-mode \; send-keys ?

# ── Reload config (WezTerm: leader r) ────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ── Quick pane cycling (WezTerm: Ctrl+Tab / Ctrl+Shift+Tab) ──────────────────
# Many terminals don't transmit Ctrl+Tab; bound without prefix where they do.
bind -n C-Tab       select-pane -t :.+
bind -n C-S-Tab     select-pane -t :.-

# ── Mouse support ────────────────────────────────────────────────────────────
set -g mouse on

# ── 256 colors + true color ──────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Scrollback ───────────────────────────────────────────────────────────────
set -g history-limit 50000

# ── No delay on escape ───────────────────────────────────────────────────────
set -sg escape-time 0

# ── Start numbering at 1 ─────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1

# ── Status bar — Tokyo Night minimal ─────────────────────────────────────────
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left " #S "
set -g status-left-style "bg=#7aa2f7,fg=#1a1b26,bold"
set -g status-right " %H:%M "
set -g status-right-style "bg=#1a1b26,fg=#9ece6a"
set -g window-status-current-style "bg=#414868,fg=#c0caf5,bold"
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
